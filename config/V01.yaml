# SPY 5-min - Blank slate for entry/exit (conditions to be added)
# Strategy and exit modules: no signals, exit only at session close or max_hold_bars.

project:
  name: Trading Backtester
  version: 0.1

portfolio:
  initial_capital: 10000

costs:
  commission_per_side: 0
  slippage_bps: 5

data:
  source: local_parquet
  local_path: data/spy_5min_session.parquet
  ticker: SPY
  timeframe: 5m
  # Exclude pre-market and after-hours (keep 09:30–16:00 session only)
  filter_regular_session: true
  market_open_time: "09:30"
  market_close_time: "16:00"
  market_timezone: "America/New_York"

strategy:
  name: spy_5min_trend
  strategy_module: strategyV02
  class_name: HiLoATRBands
  exit_module: atr_bands_exit
  exit_class_name: ATRBandsExit
  allow_short: True
  params:
    # Indicators
    ema_periods: [8, 50, 200]
    # Base EMA used for touch condition (low/high vs EMA)
    base_ema_period: 50
    # Number of prior bars that must have touched the base EMA for a valid entry
    ema_touch_lookback_bars: 8
    atr_period: 14
    atr_method: wilder
    # Exit behavior
    exit_at_session_close: true
    session_close_time: "15:45"
    # Entry time window: no new trades before/after these times (HH:MM or HH:MM:SS). Omit or null = no restriction.
    no_entries_before: "10:00"
    no_entries_after: "15:00"
    allow_exit_on_entry_bar: True
    max_hold_bars: null
    # Stop/target/breakeven parameters
    exit_lookback_bars: 10        # stop = low/high of previous N bars
    atr_multiplier_target: 2      # 2 ATR target
    atr_multiplier_stop: 1        # kept for sizing fallback; level from lookback
    atr_multiplier_breakeven: 1.5 # move stop to breakeven after 1.5 ATR in favor
    # Pullback entry parameters
    pullback_entry_enabled: true
    atr_pullback_mult: 1.0        # enter within X ATR of LOD/HOD from signal bar
    pullback_max_bars: 5        # void trade if pullback zone not hit within N bars
    # Position sizing / PnL (backtester uses these when stop_level/target_level are nan)
    risk_pct_per_trade: 0.10
    risk_dollars_per_trade: 500
    risk_cap_pct_of_capital: 1.0
    dollar_pnl_mode: "options"
    breakeven_tol: 0.01
    exit_target_strategy: "atr"
    # Optional indicators for future use
    atr_bands_enabled: false
    st_trend_oscillator_enabled: true
    st_trend_oscillator_timeframe: "5m"
    # ST Trend Oscillator entry filters
    st_trend_oscillator_bars_above: 10          # previous N bars osc vs ema
    st_trend_oscillator_sim_min_spread: 2.0     # min |osc_sim - ema_sim| to enter
    # Optional overrides for L1/L2 (default 15m preset: L1=50, L2=65 per ThinkScript)
    # st_trend_oscillator_L1: 50
    # st_trend_oscillator_L2: 65
    st_trend_oscillator_trend_osc_seed: 43.9538
    st_trend_oscillator_ema_seed: 49.477
    st_trend_oscillator_prev_30min_close_seed: 264.45
    htf_tmo_enabled: true
    htf_tmo_timeframe: "30min"
    htf_tmo_length: 14
    htf_tmo_calc_length: 5
    htf_tmo_smooth_length: 3

# Walk-Forward Optimization - no entry/exit params to optimize (blank slate)
wfo:
  train_months: 12
  test_months: 3
  step_months: 3
  optimization:
    n_trials: 50
    objective: composite_score
    min_trades_per_month: 10
    max_trades_per_month: 25
    max_drawdown_pct_cap: -25
    min_win_rate_pct: 45
    composite_weights:
      expectancy: 0.25
      max_drawdown_pct: 0.18
      sharpe_ratio: 0.20
      win_rate_pct: 0.28
      trades_per_month: 0.04
      breakeven_exits_pct: 0.05
    consistency_subperiods: 6
    consistency_weight: 0.0
    consistency_mode: variance_penalty
    param_stability_penalty_weight: 0.05
  ranking:
    stability_weight: 0.30
    consistency_top_n: 5
  parameters: {}
